<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crypto Ticker Overlay</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
  }

  /* Wrapper untuk memperbesar tampilan widget 1.5x */
  .ticker-wrapper {
    zoom: 1.5;
    -moz-transform: scale(1.5);
    -moz-transform-origin: 0 0;
  }
</style>
</head>
<body>
  <div class="ticker-wrapper">
    <script src="https://widgets.coingecko.com/gecko-coin-price-marquee-widget.js"></script>
    <gecko-coin-price-marquee-widget
      locale="en"
      dark-mode="true"
      outlined="true"
      coin-ids="monad,emonad,chog,molandak-2,143-token"
      initial-currency="usd">
    </gecko-coin-price-marquee-widget>
  </div>
</body>
</html>
